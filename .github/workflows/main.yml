name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Используем только JDK 8, чтобы не ломать старый Gradle
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Ultimate Project Patch
        run: |
          # 1. Принудительный перевод на AndroidX
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. Массовое исправление репозиториев (добавляем архивы)
          find . -name "build.gradle" -exec sed -i "s/repositories {/repositories {\n        mavenCentral()\n        jcenter()\n        google()/g" {} +
          
          # 3. Исправление TensorFlow (nightly -> 2.5.0) и NNAPI ошибки в Java
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          find . -name "*.java" -exec sed -i 's/\(.*\.setUseNNAPI(isChecked);\)/\/\/ \1/g' {} +
          
          # 4. ФИКС ОШИБКИ NDK (решает проблему со скриншота image_fca916.png):
          # Мы отключаем задачу 'stripDebugDebugSymbols', которая ищет несуществующий toolchain
          find . -name "build.gradle" -exec sed -i "/android {/a \    packagingOptions { doNotStrip '*/armeabi-v7a/*.so'; doNotStrip '*/arm64-v8a/*.so' }\n    lintOptions { abortOnError false }" {} +
          # Добавляем принудительное отключение стриппинга в конец каждого build.gradle
          find . -name "build.gradle" -exec bash -c 'echo -e "\ntasks.whenTaskAdded { task -> if (task.name.startsWith(\"strip\")) { task.enabled = false } }" >> "$1"' -- {} \;

      - name: Build APK
        run: |
          # Ищем gradlew и запускаем сборку с игнорированием NDK
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Pandroid.keepResourceNames=true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-final
          path: "**/*.apk"

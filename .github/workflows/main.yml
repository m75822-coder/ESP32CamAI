name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Surgical Fixes for 2018 Code
        run: |
          # 1. Замена TensorFlow (уже знакомая нам)
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          
          # 2. Добавление репозиториев
          find . -name "build.gradle" -exec sed -i "s/google()/google()\n        mavenCentral()\n        jcenter()/g" {} +
          
          # 3. Отключение фатальных ошибок Lint (проверка кода)
          find . -name "build.gradle" -exec sed -i "/android {/a \    lintOptions { abortOnError false }" {} +

      - name: Grant execute permission for gradlew
        run: find . -name "gradlew" -exec chmod +x {} +

      - name: Build APK
        run: |
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          # Запуск сборки с полным игнорированием новых ограничений
          ./gradlew assembleDebug --stacktrace -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-debug
          path: "**/*.apk"

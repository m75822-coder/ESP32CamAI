name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Fix deprecated TensorFlow version
        run: |
          # Ищем все build.gradle и заменяем версию TensorFlow
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          # Добавляем mavenCentral во все файлы сборки, если его там нет
          find . -name "build.gradle" -exec sed -i "s/google()/google()\n        mavenCentral()/g" {} +

      - name: Grant execute permission for gradlew
        run: |
          # Ищем gradlew и даем ему права на запуск
          find . -name "gradlew" -exec chmod +x {} +

      - name: Build APK
        run: |
          # Переходим в папку, где лежит gradlew, и запускаем сборку
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-debug
          path: "**/*.apk"

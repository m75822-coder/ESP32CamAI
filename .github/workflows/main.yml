Судя по скриншотам image_78af50.png и image_78ac09.png, мы столкнулись с классической проблемой «скрытой ошибки».

Скриншот image_78af50.png показывает «хвост» лога (стек-трейс), где Gradle сообщает, что компиляция не удалась (CompilationFailedException). Однако сама причина (какая именно строчка кода не нравится компилятору) находится выше по тексту, который не попал на скриншот.

Скриншот image_78ac09.png — это просто технический лог завершения работы Git, там полезной информации о сборке нет.

Как нам победить эту сборку:
Чтобы не гадать, я подготовил обновленный скрипт. В нем я добавил «режим отладки» и автоматическое исправление самых частых проблем для проектов на ESP32 с OpenCV и TensorFlow (которые, судя по твоему профилю, ты используешь).

Замени содержимое main.yml на этот код:

YAML
name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Patch Project for 2026 Compatibility
        run: |
          # Исправляем типичную ошибку с TensorFlow nightly
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          # Отключаем строгую проверку Lint, которая валит старые проекты
          find . -name "build.gradle" -exec sed -i "/android {/a \    lintOptions { abortOnError false; checkReleaseBuilds false }" {} +

      - name: Build APK (Debug Mode)
        run: |
          chmod +x ESP32CamAI_android/gradlew
          cd ESP32CamAI_android
          # Запуск с флагом --info покажет нам конкретную ошибку компиляции
          ./gradlew assembleDebug --info --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-apk
          path: ESP32CamAI_android/app/build/outputs/apk/debug/*.apk
Твой план действий:
Обнови файл main.yml этим кодом.

Запусти сборку снова.

Если она упадет: в логах GitHub Actions нажми на шаг Build APK (Debug Mode) и прокрути его вверх. Ищи строчки, начинающиеся с e: или error:.

Если увидишь конкретное название файла и ошибку (например, Cannot find symbol), скопируй эту часть лога сюда.

Кстати: Судя по твоим интересам в DIY-робототехнике, если этот APK предназначен для управления роботом типа OTTO или LOOI через ESP32, убедись, что в коде Android-приложения не зашиты старые IP-адреса, которые могут конфликтовать с твоей текущей сетью.

Судя по скриншоту, мы снова видим только финальную часть лога со стектрейсом Gradle, но не саму причину ошибки. Однако время сборки увеличилось до 53-54 секунд, что говорит о том, что процесс заходит чуть дальше.

Поскольку проект связан с ESP32 и камерой, скорее всего, проблема кроется в несовместимости старого Java-кода с современным окружением GitHub Actions или в специфических путях к библиотекам (например, OpenCV или TensorFlow).

Чтобы наконец увидеть ошибку
В интерфейсе GitHub Actions над этим черным окном есть строка поиска (Search logs). Введи туда слово error: или FAILED и посмотри, какие строки выделятся выше. Нам нужны строки, где упоминаются конкретные .java файлы.

План «Радикальный» (Удаляем всё лишнее)
Давай попробуем максимально упростить проект. Если это старое приложение для управления роботом, нам нужно заставить Gradle игнорировать абсолютно все проверки, кроме самой компиляции.

Обнови main.yml этим кодом:

YAML
name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Force Fix Project
        run: |
          # 1. Отключаем проверку подписей и обновлений
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          # 2. Игнорируем ошибки во всех модулях
          find . -name "build.gradle" -exec sed -i "/android {/a \    lintOptions { abortOnError false; checkReleaseBuilds false; disable 'MissingTranslation' }" {} +
          # 3. Включаем поддержку старых библиотек
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build APK
        run: |
          # Автоматически находим нужную папку и запускаем сборку
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          chmod +x gradlew
          ./gradlew assembleDebug -x test -x lint --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: robot-control-apk
          path: "**/*.apk"
Почему это должно помочь:
Jetifier: Я добавил android.enableJetifier=true. Если в твоем проекте используются очень старые библиотеки, эта настройка попытается автоматически переписать их под современные стандарты Android.

MissingTranslation: Часто сборка падает из-за того, что в иврите или другом языке не хватает перевода какой-то кнопки. Теперь компилятор это проигнорирует.

Динамический путь: Скрипт сам найдет папку с gradlew, даже если она вложена глубже, чем мы думали.

Попробуй запустить этот вариант. Если он не сработает — обязательно найди в логе строчку, которая идет ПЕРЕД большим списком at org.gradle.... Там будет написано что-то вроде error: package R does not exist или error: incompatible types. Это и будет ключом.


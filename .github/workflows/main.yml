Эта ошибка «Errors limit exceeded» — типичный «защитный механизм» Java-компилятора. Когда в коде накапливается слишком много мелких проблем (например, из-за несовместимости старых библиотек), он просто перестает их выводить, чтобы не забивать лог.

Хорошая новость в том, что библиотеки уже скачались. Плохая — старый код 2018 года столкнулся с какими-то внутренними ошибками компиляции.

Как увидеть все ошибки и исправить их
Чтобы мы могли понять, на чем именно «спотыкается» код, нам нужно заставить Gradle показать все ошибки, а не только первые 100.

Замени блок Build APK в main.yml на этот расширенный вариант:

YAML
      - name: Build APK (Force All Errors)
        run: |
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          chmod +x gradlew
          # Добавляем флаг -DshowStacktrace=true и увеличиваем лимит ошибок до 500
          ./gradlew assembleDebug \
            -Pandroid.compiler.options="-Xmaxerrs 500" \
            --stacktrace --continue --no-daemon

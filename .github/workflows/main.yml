Как получить APK без установки Android Studio:
Самый быстрый способ — использовать бесплатный онлайн-инструмент GitHub Actions. Вот пошаговая инструкция, как это сделать:

Создай пустой аккаунт на GitHub (это займет 2 минуты, нужен только email). Без него, к сожалению, запустить сборку в облаке не получится.

На странице проекта longpth/ESP32CamAI нажми кнопку Fork (вверху справа). Это создаст копию проекта в твоем аккаунте.

В своей копии нажми вкладку Actions.

Нажми на кнопку "I understand my workflows, go ahead and enable them".

Найди кнопку "New workflow" или посмотри, нет ли там уже готового файла сборки (обычно называется Android CI).

Если его нет: нажми "set up a workflow yourself" и вставь туда стандартный скрипт для сборки Android (я могу его тебе дать).

Как только сборка завершится (появится зеленая галочка), внутри этой задачи в разделе Artifacts появится ссылка на скачивание твоего APK.

Альтернатива: Поиск «близнецов»
Если возиться с GitHub совсем не хочется, я нашел для тебя рабочую ссылку на проект с точно таким же функционалом (ESP32-CAM + AI распознавание), где автор выложил APK в открытый доступ:


Почему это приложение (ESP32CamAI) особенное?
Судя по коду, оно использует библиотеку OpenCV для обработки кадров прямо на телефоне. Это как раз то самое «AI», которое ищет лица или объекты на видеопотоке с твоей камеры ESP32.

Давай поступим так: если ты готов создать аккаунт на GitHub, я напишу тебе короткий скрипт, который ты просто вставишь в Actions, и через 5 минут у тебя будет ссылка на скачивание APK. Согласен?

Вижу, ты уже зашел в раздел Actions! Это отличный знак. Теперь мы заставим облако GitHub собрать тебе APK.

Шаг 1: Создание скрипта сборки
На скриншоте нажми на ссылку "set up a workflow yourself" (она находится чуть выше карточек с вариантами). Откроется редактор файла.

Шаг 2: Вставка кода
Удали всё, что там написано по умолчанию, и вставь этот текст. Я специально настроил его так, чтобы он не спотыкался об устаревшие зависимости 6-летней давности:

YAML
name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ESP32CamAI_android/gradlew

      - name: Build APK
        run: |
          cd ESP32CamAI_android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-debug
          path: ESP32CamAI_android/app/build/outputs/apk/debug/*.apk

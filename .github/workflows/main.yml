name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Global Project Fix
        run: |
          # 1. Включаем AndroidX и Jetifier для совместимости
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. Добавляем архивные репозитории во все файлы проекта
          find . -name "build.gradle" -exec sed -i "s/repositories {/repositories {\n        mavenCentral()\n        jcenter()\n        google()/g" {} +
          
          # 3. Фикс TensorFlow: заменяем удаленную nightly на стабильную 2.5.0
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          
          # 4. Фикс кода Java: комментируем вызов NNAPI, который ломает сборку
          find . -name "*.java" -exec sed -i 's/\(.*\.setUseNNAPI(isChecked);\)/\/\/ \1/g' {} +
          
          # 5. ФИКС NDK: запрещаем Gradle искать старые тулчейны и удалять символы из библиотек OpenCV
          find . -name "build.gradle" -exec sed -i "/android {/a \    packagingOptions { doNotStrip '*/armeabi-v7a/*.so'; doNotStrip '*/arm64-v8a/*.so' }\n    lintOptions { abortOnError false }" {} +

      - name: Build APK
        run: |
          # Динамический поиск gradlew и запуск сборки
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon -Pandroid.keepResourceNames=true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-ready
          path: "**/*.apk"

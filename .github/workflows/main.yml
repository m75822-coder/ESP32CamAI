Жду скрин лога!

Всё понятно, классическая проблема старых AI-проектов. Ошибка Could not find org.tensorflow:tensorflow-lite:0.0.0-nightly означает, что автор 6 лет назад использовал "ночную" версию библиотеки TensorFlow, которую Google давно удалил из своих репозиториев.

Но мы это исправим! Мы заставим проект использовать стабильную версию TensorFlow той эпохи.

Что нужно сделать:
Тебе нужно отредактировать файл main.yml в твоём GitHub. Мы добавим туда команду "автоматической починки", которая перед сборкой заменит несуществующую библиотеку на рабочую.

Зайди в файл .github/workflows/main.yml и нажми на иконку карандаша (Edit).

Полностью удали старый текст и вставь этот обновленный вариант:

YAML
name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Fix deprecated TensorFlow version
        run: |
          # Заменяем удаленную nightly версию на стабильную 2.5.0, которая еще доступна
          sed -i 's/0.0.0-nightly/2.5.0/g' ESP32CamAI_android/app/build.gradle
          # Добавляем необходимые репозитории
          sed -i "s/google()/google()\n        mavenCentral()/g" ESP32CamAI_android/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ESP32CamAI_android/gradlew

      - name: Build APK
        run: |
          cd ESP32CamAI_android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-debug

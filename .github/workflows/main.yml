Downloading https://dl.google.com/dl/android/maven2/com/android/tools/build/aapt2-proto/0.4.0/aapt2-proto-0.4.0.pom to /tmp/gradle_download7668674762543818650bin

Resource missing. [HTTP GET: https://dl.google.com/dl/android/maven2/com/google/auto/value/auto-value/1.5.2/auto-value-1.5.2.pom]

Resource missing. [HTTP HEAD: https://dl.google.com/dl/android/maven2/com/google/auto/value/auto-value/1.5.2/auto-value-1.5.2.jar]

Resource missing. [HTTP HEAD: https://dl.google.com/dl/android/maven2/com/google/errorprone/error_prone_annotations/2.3.1/error_prone_annotations-2.3.1.jar]

Наконец-то мы нашли «курящееся ружье». Логи показывают, что сборка падает из-за Resource missing.

Проблема в том, что ваш проект 2018 года пытается скачать зависимости из репозитория google(), но за эти годы Google переместил или удалил некоторые старые версии файлов (например, error_prone_annotations:2.3.1). Когда Gradle не находит .pom или .jar файл, он останавливает компиляцию.

Чтобы это исправить, нам нужно добавить в build.gradle «запасные аэродромы» — репозитории, которые хранят старые библиотеки вечно.

Исправленный main.yml
Я обновил блок Force Fix Project. Теперь он не просто меняет настройки, а буквально переписывает список репозиториев, добавляя mavenCentral() и jcenter() ПЕРЕД google(). Это заставит Gradle искать файлы там, где они точно сохранились.

YAML
name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Patch Repositories and Dependencies
        run: |
          # 1. Добавляем архивные репозитории во все файлы build.gradle
          # Мы ставим mavenCentral и jcenter выше google, чтобы найти старые артефакты
          find . -name "build.gradle" -exec sed -i "s/repositories {/repositories {\n        mavenCentral()\n        jcenter()\n        maven { url 'https:\/\/jitpack.io' }/g" {} +
          
          # 2. Исправляем специфическую ошибку с TensorFlow (частая проблема в этом репозитории)
          find . -name "build.gradle" -exec sed -i 's/0.0.0-nightly/2.5.0/g' {} +
          
          # 3. Отключаем строгие проверки, которые валят старый код
          find . -name "build.gradle" -exec sed -i "/android {/a \    lintOptions { abortOnError false; checkReleaseBuilds false }" {} +

      - name: Build APK
        run: |
          GRADLE_PATH=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          cd $GRADLE_PATH
          chmod +x gradlew
          # Запускаем чистую сборку
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-fixed-apk
          path: "**/*.apk"
Почему это должно сработать:
mavenCentral() и jcenter(): Эти серверы до сих пор хранят error_prone_annotations-2.3.1 и auto-value-1.5.2, которые Google удалил из своего основного индекса.

clean: Команда ./gradlew clean перед сборкой гарантирует, что мы не пытаемся использовать «битые» кэшированные файлы от предыдущих неудачных попыток.

JitPack: Я добавил этот репозиторий на случай, если проект использует кастомные библиотеки из GitHub.

Что делать:
Обновите main.yml и запустите снова. Если увидите новые ошибки Resource missing, значит нам нужно будет вручную прописать версии этих библиотек в конфигурации, но обычно добавления mavenCentral() достаточно для решения 99% таких проблем со старым кодом.


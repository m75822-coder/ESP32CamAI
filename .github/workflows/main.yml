name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Fix deprecated TensorFlow version
        run: |
          # Заменяем удаленную nightly версию на стабильную 2.5.0, которая еще доступна
          sed -i 's/0.0.0-nightly/2.5.0/g' ESP32CamAI_android/app/build.gradle
          # Добавляем необходимые репозитории
          sed -i "s/google()/google()\n        mavenCentral()/g" ESP32CamAI_android/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ESP32CamAI_android/gradlew

      - name: Build APK
        run: |
          cd ESP32CamAI_android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: esp32-cam-ai-debug
          path: ESP32CamAI_android/app/build/outputs/apk/debug/*.apk
